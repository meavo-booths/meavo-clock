[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
; Keep upload baud modest — higher rates often drop on XIAO native USB after the stub.
upload_speed = 115200
; Native USB CDC: 1200bps touch enters download mode. Do NOT reset again afterward
; (usb_reset/default_reset can knock the chip out of the bootloader).
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
board_upload.require_upload_port = yes
board_upload.before_reset = no_reset
board_upload.after_reset = hard_reset
board_build.filesystem = littlefs
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    adafruit/Adafruit PN532@^1.3.3
    adafruit/RTClib@^2.1.4
    bblanchon/ArduinoJson@^7.2.1
